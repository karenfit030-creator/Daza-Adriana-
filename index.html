<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Nutricional – Adriana Daza</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #ff3daa;
    --rose-light: #3a1a2e;
    --rose-dark: #cc2288;
    --cream: #111111;
    --dark: #0a0a0a;
    --text: #f0f0f0;
    --muted: #999999;
    --card: #1e1e1e;
    --border: #2e2e2e;
    --green: #ff6b00;
    --amber: #ff3daa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* HERO */
  .hero {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    overflow: hidden;
  }

  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(30,18,24,0.92) 0%, rgba(30,18,24,0.45) 50%, rgba(30,18,24,0.1) 100%);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem 1.5rem 3rem;
    width: 100%;
  }

  .badge {
    display: inline-block;
    background: var(--rose);
    color: white;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.35rem 1rem;
    border-radius: 2rem;
    margin-bottom: 1rem;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    color: white;
    line-height: 1.05;
    margin-bottom: 0.5rem;
  }

  .hero-sub {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.06em;
    margin-bottom: 2rem;
  }

  .scroll-hint {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    color: rgba(255,255,255,0.5);
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    animation: bounce 2s infinite;
  }

  .scroll-hint span { font-size: 1.2rem; }

  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
  }

  /* MACROS BAR */
  .macros-bar {
    background: var(--dark);
    color: white;
    padding: 1.5rem;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
    text-align: center;
  }

  .macro-item label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 0.25rem;
  }

  .macro-item strong {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: white;
    line-height: 1;
  }

  .macro-item span {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
  }

  /* PROFILE */
  .section { padding: 2rem 1.25rem; }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--rose);
    margin-bottom: 1.25rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--border);
  }

  .profile-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }

  .profile-card {
    background: #1e1e1e;
    border: 1px solid var(--border);
    border-radius: 1rem;
    padding: 1rem 0.75rem;
    text-align: center;
  }

  .profile-card .val {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--rose);
    display: block;
  }

  .profile-card .lbl {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* MACRO PIE VISUAL */
  .macro-visual {
    background: #1e1e1e;
    border: 1px solid var(--border);
    border-radius: 1rem;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .macro-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }

  .macro-row:last-child { margin-bottom: 0; }

  .macro-label { font-size: 0.8rem; font-weight: 500; min-width: 90px; }

  .macro-bar-wrap {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    margin: 0 0.75rem;
    overflow: hidden;
  }

  .macro-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s ease;
  }

  .macro-val { font-size: 0.78rem; font-weight: 600; color: var(--text); min-width: 48px; text-align: right; }

  /* DAYS NAV */
  .days-nav {
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    padding: 0 1.25rem 1rem;
    scrollbar-width: none;
  }

  .days-nav::-webkit-scrollbar { display: none; }

  .day-btn {
    flex-shrink: 0;
    background: #1e1e1e;
    border: 1.5px solid var(--border);
    border-radius: 0.75rem;
    padding: 0.5rem 0.9rem;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .day-btn.active {
    background: var(--rose);
    border-color: var(--rose);
    color: white;
  }

  /* DAY PANEL */
  .day-panel { display: none; padding: 0 1.25rem; }
  .day-panel.active { display: block; }

  .day-header {
    background: linear-gradient(135deg, var(--rose-dark), var(--rose));
    color: white;
    border-radius: 1rem;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .day-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 0.25rem;
  }

  .day-header p { font-size: 0.78rem; opacity: 0.8; }

  /* MEAL CARD */
  .meal-card {
    background: #1e1e1e;
    border: 1px solid var(--border);
    border-radius: 1rem;
    margin-bottom: 0.75rem;
    overflow: hidden;
  }

  .meal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.1rem;
    cursor: pointer;
    user-select: none;
  }

  .meal-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .meal-emoji { font-size: 1.3rem; }

  .meal-name {
    font-weight: 600;
    font-size: 0.9rem;
    color: #ffffff;
  }

  .meal-time {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.1rem;
  }

  .meal-kcal {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--rose);
    background: var(--rose-light);
    padding: 0.25rem 0.6rem;
    border-radius: 1rem;
  }

  .meal-toggle {
    font-size: 0.8rem;
    color: var(--muted);
    margin-left: 0.5rem;
    transition: transform 0.2s;
  }

  .meal-toggle.open { transform: rotate(180deg); }

  .meal-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 0;
  }

  .meal-body.open { display: block; }

  .food-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }

  .food-table th {
    background: #161616;
    padding: 0.5rem 1rem;
    text-align: left;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }

  .food-table td {
    padding: 0.65rem 1rem;
    border-top: 1px solid var(--border);
    vertical-align: top;
  }

  .food-table td:first-child { font-weight: 500; color: #ffffff; }
  .food-table td .note { font-size: 0.7rem; color: var(--muted); display: block; margin-top: 0.15rem; }
  .food-table td .macros-mini { font-size: 0.68rem; color: var(--muted); }

</style>
</head>
<body>

<section class="hero">
  <img class="hero-img" src="https://raw.githubusercontent.com/TU_USUARIO/TU_REPO/main/banner.jpg" alt="Adriana Daza Portada">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <span class="badge">Plan Nutricional · Recomposición Corporal</span>
    <h1 class="hero-title">Adriana<br>7 Días</h1>
    <p class="hero-sub">39 años · 65 kg · 1.62 m · Entreno Lun–Vie</p>
    <div class="scroll-hint">
      <span>↓</span>
      Desplázate
    </div>
  </div>
</section>

<div class="macros-bar">
  <div class="macro-item">
    <label>Calorías</label>
    <strong>1,950</strong>
    <span>kcal</span>
  </div>
  <div class="macro-item">
    <label>Proteína</label>
    <strong>130g</strong>
    <span>520 kcal</span>
  </div>
  <div class="macro-item">
    <label>Carbos</label>
    <strong>236g</strong>
    <span>944 kcal</span>
  </div>
  <div class="macro-item">
    <label>Grasas</label>
    <strong>54g</strong>
    <span>486 kcal</span>
  </div>
</div>

<section class="section">
  <h2 class="section-title">Perfil de Adriana</h2>
  <div class="profile-grid">
    <div class="profile-card"><span class="val">39</span><span class="lbl">Años</span></div>
    <div class="profile-card"><span class="val">65</span><span class="lbl">kg Peso</span></div>
    <div class="profile-card"><span class="val">1.62</span><span class="lbl">m Altura</span></div>
    <div class="profile-card"><span class="val">1,432</span><span class="lbl">kcal TMB</span></div>
    <div class="profile-card"><span class="val">2,220</span><span class="lbl">kcal TDEE</span></div>
    <div class="profile-card"><span class="val">−12%</span><span class="lbl">Déficit</span></div>
  </div>
</section>

<script>
  function showDay(index) {
    document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('day-' + index).classList.add('active');
    document.querySelectorAll('.day-btn')[index].classList.add('active');
  }

  function toggleMeal(header) {
    const body = header.nextElementSibling;
    const arrow = header.querySelector('.meal-toggle');
    body.classList.toggle('open');
    arrow.classList.toggle('open');
  }
</script>

</body>
</html>
